<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Under Development</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
    }

    .status {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 2rem;
    }

    .status span {
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
      margin: 0 auto 1.5rem;
    }

    p {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.7;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="status">status: <span>building</span></p>
    <h1>Under Development</h1>
    <div class="divider"></div>
    <p>This site is currently being built. Check back soon.</p>
    <p class="footer">© 2026</p>
  </div>
</body>
</html>
